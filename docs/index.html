<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>每日科研简报</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem auto; max-width: 980px; padding: 0 1rem; }
    .card { padding: 1rem 1.2rem; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 1rem; }
    .chips { display:flex; gap:.5rem; flex-wrap: wrap; margin:.6rem 0 1rem; }
    .chip { border:1px solid #ccc; background:#fff; border-radius:999px; padding:.35rem .7rem; cursor:pointer; }
    .chip.active { background:#0b57d0; color:#fff; border-color:#0b57d0; }
    ul { padding-left: 1.1rem; }
    .item { margin-bottom: .85rem; }
    .meta { color:#666; font-size:.92rem; margin-top:.15rem; }
    .top { color:#333; font-size:.92rem; margin-top:.1rem; }
    a { color:#0b57d0; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>每日科研简报</h1>
    <p>最新一期：<a href="./daily/2026-03-09.html">2026-03-09</a></p>
    <p>周报总结：<a href="./weekly/2026-W11.html">2026-W11</a></p>
  </div>

  <div class="card">
    <h2>按主题筛选 + 关键词搜索</h2>
    <div class="chips" id="chips"><button class="chip active" data-theme="ALL">全部</button><button class="chip" data-theme="DiT/扩散">DiT/扩散</button><button class="chip" data-theme="世界模型/RL">世界模型/RL</button><button class="chip" data-theme="多模态">多模态</button><button class="chip" data-theme="微调/对齐">微调/对齐</button><button class="chip" data-theme="高效推理">高效推理</button></div>
    <input id="searchInput" type="search" placeholder="搜索日期/主题/Top关键词（如 DiT、世界模型、RLHF）" style="width:100%;padding:.6rem .8rem;border:1px solid #ccc;border-radius:8px;margin:.2rem 0 .8rem;"/>
    <ul id="list"><li class="item" data-themes="多模态 DiT/扩散 世界模型/RL 高效推理"><a href="./daily/2026-03-09.html"><strong>2026-03-09</strong></a><div class="meta">主题：多模态 DiT/扩散 世界模型/RL 高效推理</div><div class="top"></div></li><li class="item" data-themes="多模态 DiT/扩散 世界模型/RL 高效推理"><a href="./daily/2026-03-06.html"><strong>2026-03-06</strong></a><div class="meta">主题：多模态 DiT/扩散 世界模型/RL 高效推理</div><div class="top"></div></li><li class="item" data-themes="多模态 DiT/扩散 微调/对齐 世界模型/RL 高效推理"><a href="./daily/2026-03-05.html"><strong>2026-03-05</strong></a><div class="meta">主题：多模态 DiT/扩散 微调/对齐 世界模型/RL 高效推理</div><div class="top"></div></li><li class="item" data-themes="多模态 DiT/扩散 微调/对齐 世界模型/RL 高效推理"><a href="./daily/2026-03-04.html"><strong>2026-03-04</strong></a><div class="meta">主题：多模态 DiT/扩散 微调/对齐 世界模型/RL 高效推理</div><div class="top"></div></li></ul>
  </div>

<script>
const chips = document.querySelectorAll('.chip');
const items = document.querySelectorAll('.item');
const searchInput = document.getElementById('searchInput');
let activeTheme = 'ALL';

function applyFilters() {
  const q = (searchInput?.value || '').trim().toLowerCase();
  items.forEach(li => {
    const themes = li.dataset.themes || '';
    const text = (li.innerText || '').toLowerCase();
    const passTheme = (activeTheme === 'ALL' || themes.includes(activeTheme));
    const passQuery = (!q || text.includes(q));
    li.style.display = (passTheme && passQuery) ? '' : 'none';
  });
}

chips.forEach(btn => btn.addEventListener('click', () => {
  chips.forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  activeTheme = btn.dataset.theme;
  applyFilters();
}));

if (searchInput) {
  searchInput.addEventListener('input', applyFilters);
}
</script>
</body>
</html>
